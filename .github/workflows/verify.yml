name: verify

on:
  push:
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Compile all Python sources
        run: python -m compileall -q papercheck scripts tools tests
      - name: List registered checks
        run: python -m papercheck --list-checks
      - name: Run unit tests
        run: python -m unittest discover -s tests
      - name: Run default harness checks
        run: make -f makefiles/ManuscriptHarness.mk harness-verify
      - name: Run fixture regression suite
        run: make -f makefiles/ManuscriptHarness.mk harness-fixtures
      - name: Write JSON run report
        run: python scripts/run_report.py
