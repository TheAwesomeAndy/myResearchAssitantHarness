name: verify

on:
  push:
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Compile Python files
        run: python -m py_compile scripts/check_forbidden_phrases.py scripts/verify_latex.py scripts/check_citations.py scripts/check_table_values.py scripts/check_table_manifest.py scripts/run_fixture_tests.py scripts/run_report.py tools/check_path_markers.py
      - name: Run default harness checks
        run: make -f makefiles/ManuscriptHarness.mk harness-verify
      - name: Run fixture regression suite
        run: make -f makefiles/ManuscriptHarness.mk harness-fixtures
      - name: Write JSON run report
        run: python scripts/run_report.py
