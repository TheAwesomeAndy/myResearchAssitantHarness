name: verify

on:
  push:
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Compile Python files
        run: python -m py_compile scripts/check_forbidden_phrases.py tools/check_path_markers.py
      - name: Run harness checks
        run: make -f makefiles/ManuscriptHarness.mk harness-verify
