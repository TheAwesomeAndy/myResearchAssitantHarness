name: academic

on:
  push:
  pull_request:

jobs:
  academic:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Compile academic scripts
        run: python -m py_compile scripts/qgate.py scripts/check_heading.py scripts/check_summary.py scripts/check_signals.py
      - name: Run academic fixture
        run: make -f makefiles/AcademicHarness.mk academic-check MAIN_TEX=fixtures/good_academic/manuscript/main.tex
